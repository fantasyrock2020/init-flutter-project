name: project_structure
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: any
  get_it: ^9.0.5
  injectable: ^2.7.1+4
  path_provider: ^2.1.5
  uuid: ^4.5.3
  bloc: any
  permission_handler: ^12.0.1
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  go_router: ^17.2.3
  freezed_annotation: any
  json_annotation: any
  json_serializable: any

  domain:
    path: './domain'

  core:
    path: './packages/core'

  shared:
    path: './packages/shared'

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  build_runner: any
  injectable_generator: any
  freezed: any
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
